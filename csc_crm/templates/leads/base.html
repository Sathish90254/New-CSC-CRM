{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CSC CRM{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/sidebar.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/lead_list.css' %}">

    <link rel="stylesheet" href="{% static 'css/lead_details.css' %}">
    <link rel="stylesheet" href="{% static 'css/call_log.css' %}">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/followup.css' %}">
    <link rel="stylesheet" href="{% static 'css/pipeline_view.css' %}">
</head>
<body>
    <div class="sidebar-overlay"></div>
    
   <nav class="top-navbar">

    <div class="nav-left">

        <button class="menu-btn" id="menuToggle">
            <i class="fa-solid fa-bars"></i>
        </button>

        <div class="brand">
            <div class="logo-box">CSC</div>

            <div class="brand-text">
                <h3>CSC CRM</h3>
                <small>Institute Operations Suite</small>
            </div>
        </div>

    </div>

</nav>

    {% include "includes/sidebar.html" %}

    <div class="main-wrapper">

       


        <!-- Leads Tabs -->
      <div class="top-tabs">

    <a href="{% url 'leads:lead_capture_list' %}"
       class="{% if request.resolver_match.url_name == 'lead_capture_list' or request.resolver_match.url_name == 'lead_capture_create' %}active{% endif %}">
        Lead Capture
    </a>

    <a href="{% url 'leads:lead_pipeline_view' %}"
       class="{% if request.resolver_match.url_name == 'lead_pipeline_view' %}active{% endif %}">
        Pipeline View
    </a>

    <a href="{% url 'leads:call_logs' %}"
       class="{% if request.resolver_match.url_name == 'call_logs' %}active{% endif %}">
        Call Log
    </a>

    <a href="{% url 'leads:followup_shedule' %}"
       class="{% if request.resolver_match.url_name == 'followup_shedule' %}active{% endif %}">
        Follow Up
    </a>

    <a href="{% url 'leads:lead_conversion_report' %}"
       class="{% if request.resolver_match.url_name == 'lead_conversion_report' %}active{% endif %}">
        Conversion Report
    </a>

</div>
        <!-- Content -->
        <main class="page-content">
            {% block content %}
            {% endblock %}
        </main>
        

        

    </div>



</body>

<!-- Scripting Tags for JS -->
<script src="{% static 'js/followup.js' %}"></script>
<script src="{% static 'js/lead_capture.js' %}"></script>
<script src="{% static 'js/call_logs.js' %}"></script>
<script src="{% static 'js/base.js' %}"></script>
<script src="{% static 'js/pipeline_view.js' %}"></script>
</html>
